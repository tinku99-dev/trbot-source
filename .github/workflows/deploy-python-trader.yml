name: Deploy Python Trader (func-coinbase-trader-v2)

on:
  push:
    branches: [main]
    paths:
      - "coinbase_paper_trader/**"
      - ".github/workflows/deploy-python-trader.yml"
  workflow_dispatch:

# Required GitHub secret:
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PYTHON
#     → Azure Portal → func-coinbase-trader-v2 → Overview → Get publish profile → copy XML contents

env:
  AZURE_FUNCTIONAPP_NAME: func-coinbase-trader-v2
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coinbase_paper_trader

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: coinbase_paper_trader
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PYTHON }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
