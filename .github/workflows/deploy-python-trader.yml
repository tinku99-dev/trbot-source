name: Deploy Python Trader (func-coinbase-trader-v2)

on:
  push:
    branches: [main]
    paths:
      - "coinbase_paper_trader/**"
      - ".github/workflows/deploy-python-trader.yml"
  workflow_dispatch:

# Required GitHub environment/repo values for Azure OIDC login:
#   AZURE_CLIENT_ID        → secret or variable
#   AZURE_TENANT_ID        → secret or variable
#   AZURE_SUBSCRIPTION_ID  → secret or variable

env:
  AZURE_FUNCTIONAPP_NAME: func-coinbase-trader-v2
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: coinbase_paper_trader

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: coinbase_paper_trader
          scm-do-build-during-deployment: true
          enable-oryx-build: true
