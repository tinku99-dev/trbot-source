name: Deploy Dashboard (trbot-dashboard-v2 SWA)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

# Required GitHub secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN
#     → Azure Portal → trbot-dashboard-v2 → Overview → Manage deployment token → copy
#
# Required GitHub variables (Settings → Secrets and variables → Actions → Variables):
#   VITE_PAPER_SUMMARY_URL  = https://func-coinbase-trader-v2.azurewebsites.net/api/paper-trading/summary
#   VITE_CRYPTO_SCAN_URL    = https://func-coinbase-trader-v2.azurewebsites.net/api/crypto-scan
#   VITE_TRBOT_FUNCTION_URL = https://func-3qs3shmnmkj5m.azurewebsites.net
#   VITE_TRBOT_FUNCTION_KEY = <your-function-key>  (store as a SECRET not a variable)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_PAPER_SUMMARY_URL: ${{ vars.VITE_PAPER_SUMMARY_URL }}
          VITE_CRYPTO_SCAN_URL: ${{ vars.VITE_CRYPTO_SCAN_URL }}
          VITE_TRBOT_FUNCTION_URL: ${{ vars.VITE_TRBOT_FUNCTION_URL }}
          VITE_TRBOT_FUNCTION_KEY: ${{ secrets.VITE_TRBOT_FUNCTION_KEY }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web
          output_location: dist
          skip_app_build: true
